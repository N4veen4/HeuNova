<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HueNova</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600&family=Hurricane&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="universe-stars">
        <div class="star-layer layer-1"></div>
        <div class="star-layer layer-2"></div>
    </div>
    <div id="intro-screen">
        <div class="intro-content">
            <div class="huenova-title">
                <span class="letter" style="animation-delay: 0.2s;">H</span>
                <span class="letter" style="animation-delay: 0.3s;">u</span>
                <span class="letter" style="animation-delay: 0.4s;">e</span>
                <span class="letter" style="animation-delay: 0.5s;">N</span>
                <span class="letter" style="animation-delay: 0.6s;">o</span>
                <span class="letter" style="animation-delay: 0.7s;">v</span>
                <span class="letter" style="animation-delay: 0.8s;">a</span>
            </div>
            <div class="loader-bar"></div>
        </div>
    </div>

    <main id="app-content" class="hidden">
        <nav>
            <div class="logo script-font">HueNova</div>
            <div class="nav-links">
                <span>🆅1.0.0 </span>
            </div>
        </nav>

        <section class="hero">
            <h1>Bring Your <span class="gradient-text">Memories</span> to Life</h1>
            <p>Transform black and white photos into vibrant color with 𝓗𝓮𝓾𝓝𝓸𝓿𝓪.</p>
        </section>

        <section class="upload-section">
            <div class="upload-container glass" id="drop-zone">
                <input type="file" id="file-input" hidden accept="image/*">
                <div class="upload-info">
                    <div class="icon">📸</div>
                    <h3>Drop your B&W photo here</h3>
                    <p>or click to browse files</p>
                </div>
            </div>
        </section>

        <section class="result-section hidden" id="result-area">
            <div class="preview-grid">
                <div class="card glass">
                    <span class="label">ORIGINAL</span>
                    <img id="preview-original" src="" alt="Original Image">
                </div>
                <div class="card glass">
                    <span class="label">COLORIZED</span>
                    <img id="preview-colorized" src="" alt="Colorized Image">
                    <div id="processing-overlay" class="hidden">
                        <div class="spinner"></div>
                        <p>AI is processing...</p>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button id="colorize-btn" class="primary-btn">cₒₗₒᵣᵢzₑd ᵢₘₐgₑ</button>
                <a id="download-link" class="secondary-btn hidden">📥 Download Result</a>
            </div>
        </section>

        <footer>
            <p>© 2026 HueNova AI - N4veen</p>
        </footer>
    </main>

    <script src="/static/script.js"></script>
</body>

</html>
